{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<h2>User / Admin Registration</h2>
<form method="POST" novalidate>
    <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" name="username" id="username" required />
    </div>

    <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" name="password" id="password" required />
    </div>

    <div class="mb-3">
        <label for="confirm_password" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" name="confirm_password" id="confirm_password" required />
    </div>

    <div class="mb-3">
        <label for="role" class="form-label">Register as</label>
        <select class="form-select" id="role" name="role" required onchange="toggleAdminSecret(this.value)">
            <option value="" disabled selected>Select Role</option>
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>
    </div>

    <div class="mb-3" id="admin-secret-div" style="display:none;">
        <label for="admin_secret" class="form-label">Admin Registration Secret</label>
        <input type="password" class="form-control" name="admin_secret" id="admin_secret" />
        <div class="form-text">Enter the secret key to register as admin.</div>
    </div>

    <button type="submit" class="btn btn-success">Register</button>
</form>

<script>
function toggleAdminSecret(selectedRole) {
    var secretDiv = document.getElementById('admin-secret-div');
    if(selectedRole === 'admin') {
        secretDiv.style.display = 'block';
        document.getElementById('admin_secret').required = true;
    } else {
        secretDiv.style.display = 'none';
        document.getElementById('admin_secret').required = false;
    }
}
</script>

<p class="mt-3">Already have an account? <a href="{{ url_for('login') }}">Login here</a>.</p>
{% endblock %}
