{% extends "base.html" %}
{% block title %}Edit Parking Lot{% endblock %}
{% block content %}
<h2>Edit Parking Lot: {{ lot.name }}</h2>
<form method="POST">
    <div class="mb-3">
        <label for="name" class="form-label">Parking Lot Name</label>
        <input type="text" class="form-control" id="name" name="name" value="{{ lot.name }}" required/>
    </div>
    <div class="mb-3">
        <label for="price_per_hour" class="form-label">Price Per Hour (₹)</label>
        <input type="number" step="0.01" class="form-control" id="price_per_hour" name="price_per_hour" value="{{ lot.price_per_hour }}" required/>
    </div>
    <div class="mb-3">
        <label for="address" class="form-label">Address</label>
        <textarea class="form-control" id="address" name="address" rows="2" required>{{ lot.address }}</textarea>
    </div>
    <div class="mb-3">
        <label for="pin_code" class="form-label">Pin Code</label>
        <input type="text" class="form-control" id="pin_code" name="pin_code" value="{{ lot.pin_code }}" required/>
    </div>
    <div class="mb-3">
        <label for="max_spots" class="form-label">Maximum Number of Spots</label>
        <input type="number" class="form-control" id="max_spots" name="max_spots" value="{{ lot.max_spots }}" min="1" required/>
    </div>
    <button type="submit" class="btn btn-primary">Update</button>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
