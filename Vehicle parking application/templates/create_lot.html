{% extends "base.html" %}
{% block title %}Create Parking Lot{% endblock %}
{% block content %}
<h2>Create Parking Lot</h2>
<form method="POST">
    <div class="mb-3">
        <label for="name" class="form-label">Parking Lot Name</label>
        <input type="text" class="form-control" id="name" name="name" required/>
    </div>
    <div class="mb-3">
        <label for="price_per_hour" class="form-label">Price Per Hour (₹)</label>
        <input type="number" step="0.01" class="form-control" id="price_per_hour" name="price_per_hour" required/>
    </div>
    <div class="mb-3">
        <label for="address" class="form-label">Address</label>
        <textarea class="form-control" id="address" name="address" rows="2" required></textarea>
    </div>
    <div class="mb-3">
        <label for="pin_code" class="form-label">Pin Code</label>
        <input type="text" class="form-control" id="pin_code" name="pin_code" required/>
    </div>
    <div class="mb-3">
        <label for="max_spots" class="form-label">Maximum Number of Spots</label>
        <input type="number" class="form-control" id="max_spots" name="max_spots" min="1" required/>
    </div>
    <button type="submit" class="btn btn-success">Create</button>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
