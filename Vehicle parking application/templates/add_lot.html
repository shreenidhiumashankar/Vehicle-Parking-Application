<!DOCTYPE html>
<html>
<head>
    <title>Add Parking Lot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Add Parking Lot</h2>
    <form method="POST">
        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Price (per hour)</label>
            <input type="number" step="0.1" name="price" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Address</label>
            <textarea name="address" class="form-control" required></textarea>
        </div>
        <div class="mb-3">
            <label>Pincode</label>
            <input type="text" name="pincode" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Maximum Spots</label>
            <input type="number" name="max_spots" class="form-control" required>
        </div>
        <button class="btn btn-success" type="submit">Create Lot</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Back</a>
    </form>
</body>
</html>
